name: Deploy API (Cloudflare Workers)

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/prisma/**'
      - 'packages/types/**'

jobs:
  deploy:
    name: Migrate DB & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations
        run: pnpm --filter prisma exec prisma migrate deploy
        env:
          # 直连地址用于 migrate（不走 PgBouncer）
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter api exec wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
